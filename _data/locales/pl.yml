# The layout text of site

# ----- Commons label -----

layout:
  post: Post
  category: Kategoria
  tag: Tag

# The tabs of sidebar
tabs:
  # format: <filename_without_extension>: <value>
  home: Home
  categories: Kategorie
  tags: Tagi
  archives: Archiwum
  about: O mnie

# the text displayed in the search bar & search results
search:
  hint: szukaj
  cancel: Anuluj
  no_results: Ups! Nic nie znaleziono...

panel:
  lastmod: Ostatnio zaktualizowane
  trending_tags: Tagi zeskujące na popularności
  toc: Spis treści

copyright:
  # Shown at the bottom of the post
  license:
    template: Ten post jest objęty licencją :LICENSE_NAME udzieloną przez autora.
    name: CC BY 4.0
    link: https://creativecommons.org/licenses/by/4.0/

  # Displayed in the footer
  brief: Pewne prawa zastrzeżone.
  verbose: >-
    O ile nie zaznaczono inaczej, posty na blogu są objęte licencją Creative Commons Attribution 4.0 International (CC BY 4.0).

meta: Korzystam z :PLATFORM motyw :THEME.

not_found:
  statment: Ups! Ten link prowadzi w nieistniejące miejsce...

notification:
  update_found: Dostępna jest nowa wersja
  update: Aktualizuj

# ----- Posts related labels -----

post:
  written_by: przez
  posted: Opublikowane
  updated: Zaktualizowane
  words: słowa
  pageview_measure: wyświetlenia
  read_time:
    unit: min
    prompt: czytania
  relate_posts: Czytaj dalej
  share: Udostępnij
  button:
    next: Następne
    previous: Poprzedni
    copy_code:
      succeed: Skopiowano!
    share_link:
      title: Kopiuj link
      succeed: Skopiowano!
  # pinned prompt of posts list on homepage
  pin_prompt: Przypięte

# Date time format.
# See: <http://strftime.net/>, <https://day.js.org/docs/en/display/format>
df:
  post:
    strftime: '%b %e, %Y'
    dayjs: 'll'
  archives:
    strftime: '%b'
    dayjs: 'MMM'

# categories page
categories:
  category_measure:
    singular: karegoria
    plural: kategorie
  post_measure:
    singular: post
    plural: posty